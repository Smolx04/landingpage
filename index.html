<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shipping Information</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 12px;
    }

    label {
      font-weight: bold;
      margin-bottom: 5px;
    }

    input, select {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row .form-group {
      flex: 1;
    }

    button {
      width: 100%;
      padding: 12px;
      background: black;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #333;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Shipping Information</h2>

  <form>

    <div class="row">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" required>
      </div>

      <div class="form-group">
        <label>Last Name</label>
        <input type="text" required>
      </div>
    </div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text">
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" required>
    </div>

    <div class="row">
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" required>
      </div>

      <div class="form-group">
        <label>Alternate Phone Number</label>
        <input type="tel">
      </div>
    </div>

    <div class="form-group">
      <label>Address Line 1</label>
      <input type="text" required>
    </div>

    <div class="form-group">
      <label>Address Line 2</label>
      <input type="text">
    </div>

    <div class="form-group">
      <label>Street Address</label>
      <input type="text">
    </div>

    <div class="form-group">
      <label>Apartment / Suite / Unit</label>
      <input type="text">
    </div>

    <div class="row">
      <div class="form-group">
        <label>City</label>
        <input type="text" required>
      </div>

      <div class="form-group">
        <label>State / Region / Province</label>
        <input type="text">
      </div>
    </div>

    <div class="row">
      <div class="form-group">
        <label>ZIP / Postal Code</label>
        <input type="text">
      </div>

      <div class="form-group">
        <label>Country</label>
        <input type="text" required>
      </div>
    </div>

    <button type="submit">Submit Order</button>

  </form>
</div>

</body>
</html>
